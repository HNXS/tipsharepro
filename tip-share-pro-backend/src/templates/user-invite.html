<!--
  User Invite
  ===========
  Sent when an admin adds a new team member.

  Variables:
    {{inviterName}}  — email or name of the person who sent the invite
    {{companyName}}  — the company / restaurant name
    {{roleLabel}}    — human-readable role ("Administrator", "Manager", "Data")
-->
<h2 style="margin:0 0 16px;font-size:20px;color:#1a1a2e;">You&rsquo;ve Been Invited!</h2>
<p style="margin:0 0 12px;font-size:15px;color:#333;line-height:1.6;">
  <strong>{{inviterName}}</strong> has invited you to join
  <strong>{{companyName}}</strong> on TipSharePro as a <strong>{{roleLabel}}</strong>.
</p>
<p style="margin:0 0 12px;font-size:15px;color:#333;line-height:1.6;">
  Sign in with this email address to get started.
</p>
<div style="text-align:center;margin:24px 0;">
  <a href="https://app.tipsharepro.com" style="display:inline-block;padding:12px 32px;background:#1a1a2e;color:#ffffff;text-decoration:none;border-radius:6px;font-weight:600;font-size:14px;">Sign In</a>
</div>
