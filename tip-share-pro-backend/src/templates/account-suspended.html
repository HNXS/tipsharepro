<!--
  Account Suspended
  =================
  Sent when a subscription is cancelled / payment fails permanently.

  Variables:
    {{companyName}}  — the company / restaurant name
-->
<h2 style="margin:0 0 16px;font-size:20px;color:#c0392b;">Account Suspended</h2>
<p style="margin:0 0 12px;font-size:15px;color:#333;line-height:1.6;">
  Your TipSharePro account for <strong>{{companyName}}</strong> has been suspended
  due to a payment issue.
</p>
<p style="margin:0 0 12px;font-size:15px;color:#333;line-height:1.6;">
  Your data is safe and will remain available. To restore access, please update your payment method.
</p>
<div style="text-align:center;margin:24px 0;">
  <a href="https://app.tipsharepro.com" style="display:inline-block;padding:12px 32px;background:#1a1a2e;color:#ffffff;text-decoration:none;border-radius:6px;font-weight:600;font-size:14px;">Update Payment</a>
</div>
<p style="margin:0;font-size:13px;color:#888;">
  Need help? Contact our support team and we&rsquo;ll get you sorted out.
</p>
