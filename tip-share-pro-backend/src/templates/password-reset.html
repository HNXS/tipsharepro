<!--
  Password Reset
  ==============
  Sent when a user requests a password reset.

  Variables:
    {{resetUrl}}  — full URL with token (e.g. "https://app.tipsharepro.com?reset=abc123")
-->
<h2 style="margin:0 0 16px;font-size:20px;color:#1a1a2e;">Reset Your Password</h2>
<p style="margin:0 0 12px;font-size:15px;color:#333;line-height:1.6;">
  We received a request to reset your password. Click the button below to choose a new one.
</p>
<div style="text-align:center;margin:24px 0;">
  <a href="{{resetUrl}}" style="display:inline-block;padding:12px 32px;background:#1a1a2e;color:#ffffff;text-decoration:none;border-radius:6px;font-weight:600;font-size:14px;">Reset Password</a>
</div>
<p style="margin:0 0 8px;font-size:13px;color:#888;">
  This link expires in 1 hour. If you didn&rsquo;t request a password reset, you can safely ignore this email.
</p>
<p style="margin:0;font-size:12px;color:#bbb;word-break:break-all;">
  {{resetUrl}}
</p>
