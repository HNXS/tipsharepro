<!--
  Two-Factor Authentication Code
  ==============================
  Sent during login when 2FA is enabled.

  Variables:
    {{code}}  — the 6-digit verification code
-->
<h2 style="margin:0 0 16px;font-size:20px;color:#1a1a2e;">Verification Code</h2>
<p style="margin:0 0 16px;font-size:15px;color:#333;line-height:1.6;">
  Use the code below to complete your sign-in:
</p>
<div style="text-align:center;margin:20px 0;">
  <span style="display:inline-block;padding:16px 32px;background:#f4f4f7;border-radius:8px;font-size:28px;font-weight:700;letter-spacing:8px;color:#1a1a2e;font-family:'SF Mono',Menlo,monospace;">{{code}}</span>
</div>
<p style="margin:0;font-size:13px;color:#888;">
  This code expires in 10 minutes. If you didn&rsquo;t try to sign in, please secure your account immediately.
</p>
